# reload config
bind=SUPER,Escape,spawn_shell,bash ~/.config/mango/scripts/config_check.sh
bind=SUPER,Escape,reload_config

# menu and terminal
# TODO: make script (footclient if foot --server, else foot --server)
bind=SUPER,Return,spawn,footclient
# bind=SUPER,space,spawn,rofi -config ~/.config/mango/rofi/config.rasi -show drun
bind=SUPER,space,spawn,fuzzel

# code:58 = m ?
bind=SUPER+alt,Delete,quit
# code:24 = q ?
bind=SUPER,q,killclient,
bind=SUPER,b,spawn,librewolf

# switch window focus
# bind=alt,Tab,focusstack,next
# bind=SUPER,u,focuslast
bind=SUPER,Tab,focusstack,next
bind=SUPER+shift,Tab,focusstack,prev
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right

# swap window
bind=SUPER+shift,k,exchange_client,up
bind=SUPER+shift,j,exchange_client,down
bind=SUPER+shift,h,exchange_client,left
bind=SUPER+shift,l,exchange_client,right

# movewin
# TEST:
bind=SUPER+alt,k,movewin,+0,-50
bind=SUPER+alt,j,movewin,+0,+50
bind=SUPER+alt,h,movewin,-50,+0
bind=SUPER+alt,l,movewin,+50,+0


# resizewin
# TEST:
bind=SUPER+ctrl,k,resizewin,+0,-50
bind=SUPER+ctrl,j,resizewin,+0,+50
bind=SUPER+ctrl,h,resizewin,-50,+0
bind=SUPER+ctrl,l,resizewin,+50,+0

# switch window status
# bind=SUPER,tab,toggleoverview,0
bind=SUPER,o,toggleoverview,0
bind=SUPER,g,toggleglobal,
bind=SUPER,t,togglefloating,
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+ctrl,f,togglefakefullscreen,
bind=SUPER+shift,f,togglefullscreen,
# bind=SUPER,o,toggleoverlay,
bind=SUPER,m,minimized,
bind=SUPER+shift,m,restore_minimized
bind=SUPER,z,toggle_scratchpad

# scroller layout
# bind=SUPER,e,set_proportion,1.0
# bind=SUPER,x,switch_proportion_preset,

# tile layout
# bind=SUPER,e,incnmaster,1
# bind=SUPER,t,incnmaster,-1
# bind=SUPER,z,zoom,

# switch layout
# bind=SUPER,t,setlayout,tile
# bind=SUPER,s,setlayout,scroller
bind=SUPER,n,switch_layout

# tag switch
bind=SUPER+ctrl,u,viewtoleft,0
bind=SUPER+ctrl,i,viewtoright,0
bind=SUPER,u,viewtoleft_have_client,0
bind=SUPER,i,viewtoright_have_client,0
bind=SUPER+shift,u,tagtoleft,0
bind=SUPER+shift,i,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+shift,1,tag,1,0
bind=SUPER+shift,2,tag,2,0
bind=SUPER+shift,3,tag,3,0
bind=SUPER+shift,4,tag,4,0
bind=SUPER+shift,5,tag,5,0
bind=SUPER+shift,6,tag,6,0
bind=SUPER+shift,7,tag,7,0
bind=SUPER+shift,8,tag,8,0
bind=SUPER+shift,9,tag,9,0

bind=SUPER+alt,1,toggletag,1
bind=SUPER+alt,2,toggletag,2
bind=SUPER+alt,3,toggletag,3
bind=SUPER+alt,4,toggletag,4
bind=SUPER+alt,5,toggletag,5
bind=SUPER+alt,6,toggletag,6
bind=SUPER+alt,7,toggletag,7
bind=SUPER+alt,8,toggletag,8
bind=SUPER+alt,9,toggletag,9

bind=SUPER+ctrl,1,toggleview,1
bind=SUPER+ctrl,2,toggleview,2
bind=SUPER+ctrl,3,toggleview,3
bind=SUPER+ctrl,4,toggleview,4
bind=SUPER+ctrl,5,toggleview,5
bind=SUPER+ctrl,6,toggleview,6
bind=SUPER+ctrl,7,toggleview,7
bind=SUPER+ctrl,8,toggleview,8
bind=SUPER+ctrl,9,toggleview,9

# monitor switch
bind=SUPER,Left,focusmon,left
bind=SUPER,Right,focusmon,right
bind=SUPER,Up,focusmon,up
bind=SUPER,Down,focusmon,down
bind=SUPER+shift,Left,tagmon,left
bind=SUPER+shift,Right,tagmon,right
bind=SUPER+shift,Up,tagmon,up
bind=SUPER+shift,Down,tagmon,down

# gaps
bind=SUPER+SHIFT,x,incgaps,1
bind=SUPER+SHIFT,z,incgaps,-1
bind=SUPER+SHIFT,c,togglegaps


# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=SUPER,btn_middle,set_proportion,0.5
mousebind=SUPER,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER+CTRL,btn_left,togglefullscreen
mousebind=SUPER+CTRL,btn_middle,killclient
mousebind=SUPER+CTRL,btn_right,minimized

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
axisbind=SUPER,UP,focusdir,left
axisbind=SUPER,DOWN,focusdir,right
axisbind=shift+super,UP,exchange_client,left
axisbind=shift+super,DOWN,exchange_client,right

# Gesturebind
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview,1
gesturebind=none,down,4,toggleoverview,1

# brightness and volume
bind=none,XF86AudioRaiseVolume,spawn,~/.config/mango/scripts/volume.sh up
bind=none,XF86AudioLowerVolume,spawn,~/.config/mango/scripts/volume.sh down
bind=none,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/brightness.sh up
bind=none,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/brightness.sh down

#custom app bind
bind=SUPER,e,spawn,footclient -e yazi
bind=SUPER+ctrl,a,spawn_shell,grim -g "$(slurp -b '#2E2A1E55' -c '#fb751bff')" -t ppm - | satty -f -
# bind=SUPER+shift,w,spawn,bash ~/.config/mango/scripts/hide_waybar_mango.sh
bind=SUPER,f10,spawn,swaylock -f -c 000000
